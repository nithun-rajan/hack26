<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" shape-rendering="crispEdges">
  <!-- SotonShip 26 favicon — mini pixel container ship on the deep-purple deck -->
  <rect width="14" height="14" fill="#0b0516"/>
  <!-- mast -->
  <rect x="2" y="2" width="1" height="1" fill="#ffffff"/>
  <!-- containers -->
  <rect x="5" y="3" width="2" height="2" fill="#c4b5fd"/>
  <rect x="8" y="3" width="2" height="2" fill="#7c3aed"/>
  <!-- bridge -->
  <rect x="1" y="4" width="3" height="1" fill="#ffffff"/>
  <!-- hull -->
  <rect x="0" y="5" width="14" height="2" fill="#ffffff"/>
  <rect x="1" y="7" width="12" height="1" fill="#ffffff"/>
  <rect x="2" y="8" width="10" height="1" fill="#ffffff"/>
  <!-- waves -->
  <rect x="1" y="10" width="3" height="1" fill="#6d28d9"/>
  <rect x="6" y="11" width="3" height="1" fill="#6d28d9"/>
  <rect x="10" y="10" width="3" height="1" fill="#6d28d9"/>
</svg>
